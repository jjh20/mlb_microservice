apiVersion: apps/v1
kind: Deployment
metadata:
  name: mlb-service
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mlb
  template:
    metadata:
      labels:
        app: mlb
    spec:
      containers:
      - name: mlb-container
        image: nginx:latest
        ports:
        - containerPort: 80